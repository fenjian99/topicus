meta:
  title: "Topicus.com (TOI) — Investment Research"
  subtitle: "Buy Recommendation | Target C$196"
  date: "July 2026"
  slide_size: [10, 7.5]  # inches, standard widescreen
  color_palette:
    primary: "#1F3864"      # dark navy
    accent: "#2E75B6"       # mid blue
    highlight: "#ED7D31"    # orange
    positive: "#375623"     # dark green
    negative: "#C00000"     # red
    light_bg: "#F2F2F2"
    white: "#FFFFFF"

slides:

  # ── 1. COVER ──────────────────────────────────────────────────────────────
  - id: cover
    type: cover
    title: "Topicus.com Inc."
    subtitle: "A Misunderstood Vertical Market Software Compounder\nTrading at a 50% Discount to Intrinsic Value"
    body:
      - "Ticker: TOI (TSXV)  |  Market Cap: C$7.7B  |  Price: C$92.25 (Jul 7, 2026)"
      - "Recommendation: BUY  |  Base Target: C$196  |  Upside: +112%"
    logo_placeholder: "[TOI Logo]"
    presenter: "[Team Name]"
    date: "July 2026"

  # ── 2. TABLE OF CONTENTS ──────────────────────────────────────────────────
  - id: toc
    type: toc
    title: "Table of Contents"
    sections:
      - number: "01"
        label: "Company Overview"
        page: 3
      - number: "02"
        label: "Investment Thesis"
        page: 5
      - number: "03"
        label: "Business Model"
        page: 7
      - number: "04"
        label: "Financial Performance"
        page: 10
      - number: "05"
        label: "Free Cash Flow Analysis"
        page: 13
      - number: "06"
        label: "Valuation"
        page: 15
      - number: "07"
        label: "Competitive Positioning"
        page: 19
      - number: "08"
        label: "Risks & Mitigants"
        page: 21
      - number: "09"
        label: "Recommendation"
        page: 23
      - number: "APP"
        label: "Appendix"
        page: 25

  # ── 3. COMPANY OVERVIEW ───────────────────────────────────────────────────
  - id: company_overview
    type: two_column
    section: "01 — Company Overview"
    title: "Topicus.com: A European VMS Roll-Up Machine"
    left_column:
      heading: "What They Do"
      bullets:
        - "Acquires, manages and grows vertical market software (VMS) companies across Europe"
        - "Target niches: healthcare IT, public sector, financial services, education, legal — mission-critical software with high switching costs"
        - "Business model mirrors parent Constellation Software (CSU): decentralised hold-forever M&A"
        - "Spun out from Constellation Software in Jan 2021; CSU retains ~58% economic interest via preferred shares"
      subheading: "Key Facts (as of Jul 2026)"
      table:
        columns: ["Metric", "Value"]
        rows:
          - ["Exchange", "TSXV (TOI)"]
          - ["Market Cap", "C$7.7B"]
          - ["Price (Jul 7)", "C$92.25"]
          - ["52-wk Range", "C$85 – C$199"]
          - ["Currency (ops)", "EUR"]
          - ["FY2025 Revenue", "EUR 1.55B"]
          - ["FY2025 FCF", "EUR 402M"]
          - ["Employees", "~10,000+"]
    right_column:
      heading: "Geographic Footprint (FY2025 Revenue)"
      chart:
        type: donut
        title: "Revenue by Region — FY2025 (EUR 1,552M)"
        data:
          labels: ["Rest of World", "Netherlands"]
          values: [55.6, 44.4]
          colors: ["#2E75B6", "#ED7D31"]
        note: "Netherlands = legacy Topicus core; RoW = post-spinoff acquisitions across Germany, Nordics, DACH, Southern Europe"

  # ── 4. CORPORATE STRUCTURE ────────────────────────────────────────────────
  - id: corporate_structure
    type: diagram
    section: "01 — Company Overview"
    title: "Corporate Structure & Ownership"
    diagram:
      type: org_chart
      description: |
        Constellation Software (CSU TSX)
          └─ ~58% economic interest (via exchangeable preferred shares)
        Public Float ~42%
          └─ Topicus.com Inc. (TOI TSXV)
               ├─ Topicus BV (Netherlands) — legacy Topicus
               └─ Caris/TSS Group — acquired M&A platform
      note: "Mark Leonard (CSU founder) retired 2025; Robin van Poelje (Topicus CEO) intact; management continuity confirmed"
    callouts:
      - label: "Unique Structure"
        text: "Preferred shares held by CSU are exchangeable into TOI shares — creates permanent alignment and M&A discipline"
      - label: "No Dividends"
        text: "All FCF reinvested into acquisitions; no buybacks — capital returned via compounding"

  # ── 5. INVESTMENT THESIS (OVERVIEW) ───────────────────────────────────────
  - id: thesis_overview
    type: three_column
    section: "02 — Investment Thesis"
    title: "Three Pillars: Why TOI Is a Buy at C$92"
    columns:
      - number: "1"
        heading: "Mispriced Selloff"
        icon: "📉"
        bullets:
          - "Stock -54% from Jul 2025 peak of C$199 on AI-disruption fears"
          - "AI risk is real but overstated for mission-critical niche VMS"
          - "Mark Leonard retirement triggered indiscriminate selling"
          - "Price now below Morningstar FVE (C$131), analyst consensus (C$145), and our DCF (C$196)"
      - number: "2"
        heading: "Durable Compounding Engine"
        icon: "🔄"
        bullets:
          - "FCF CAGR of ~20% over 4 years (FY2022–FY2025)"
          - "EPS 3-yr growth of 36.9% — top 20% globally (Morningstar)"
          - "Recurring revenue dominates: maintenance & support fees ~60%+ of revenue"
          - "FCF margin expanding: 21.3% (FY2022) → 25.9% (FY2025)"
      - number: "3"
        heading: "Secular M&A Runway"
        icon: "🌍"
        bullets:
          - "European VMS market fragmented — thousands of family-owned software SMEs"
          - "EUR 282.5M deployed in acquisitions in FY2025 alone (up from EUR 99.8M in FY2024)"
          - "Replicating CSU's Canadian playbook in Europe where competition is lower"
          - "TAM effectively unlimited at current scale"

  # ── 6. KEY MISPRICING CATALYST ────────────────────────────────────────────
  - id: thesis_catalyst
    type: two_column
    section: "02 — Investment Thesis"
    title: "Why the Market Is Wrong: AI Fear vs. VMS Reality"
    left_column:
      heading: "The Bear Case (Market's View)"
      bullets:
        - "AI will commoditise vertical software, destroying pricing power"
        - "ChatGPT/Copilot will replace ERP and workflow tools"
        - "CSU/Topicus management DNA leaves with Mark Leonard"
        - "Low liquidity + TSXV listing = limited institutional demand"
      subheading: "Why We Disagree"
      bullets:
        - "Topicus's VMS targets are deeply embedded: hospital scheduling, municipal permitting, court case management — not spreadsheets"
        - "Switching costs: data migration risk, staff retraining, regulatory compliance make churn near-zero"
        - "AI is a feature, not a replacement — VMS vendors will embed AI and charge more"
        - "Topicus is an acquirer of software businesses, not a product company — AI just creates more acquisition targets"
    right_column:
      heading: "Price vs. Consensus Fair Value"
      chart:
        type: bar_horizontal
        title: "Current Price vs. Valuation Estimates (C$)"
        data:
          labels:
            - "Current Price"
            - "Morningstar FVE"
            - "Analyst Consensus"
            - "Bear DCF"
            - "Base DCF"
            - "Bull DCF"
          values: [92.25, 131.45, 145, 139, 196, 328]
          colors:
            - "#C00000"
            - "#2E75B6"
            - "#2E75B6"
            - "#375623"
            - "#375623"
            - "#375623"
          reference_line:
            value: 92.25
            label: "Current"
        note: "All scenarios imply significant upside from current price"

  # ── 7. BUSINESS MODEL ─────────────────────────────────────────────────────
  - id: business_model
    type: two_column
    section: "03 — Business Model"
    title: "The VMS Roll-Up Model: Acquire, Hold, Compound"
    left_column:
      heading: "Revenue Mix (Qualitative)"
      bullets:
        - "Maintenance & Support (recurring, ~60%+): annual fees from installed base — near-100% retention"
        - "Professional Services (~25%): implementation, customisation — lower margin, tied to new wins"
        - "Software Licences (~10%): upfront or SaaS fees"
        - "Hardware (~5%): peripheral, declining"
      subheading: "M&A Acquisition Criteria"
      bullets:
        - "Small to mid-size VMS businesses (EUR 1M–50M revenue)"
        - "Target IRR: 15–20%+ on deployed capital"
        - "Decentralised management retained post-acquisition"
        - "No divestitures — permanent hold philosophy"
    right_column:
      heading: "Acquisition Spend Trajectory (EUR M)"
      chart:
        type: bar
        title: "Annual M&A Spend (EUR M)"
        data:
          labels: ["FY2022", "FY2023", "FY2024", "FY2025"]
          values: [129.1, 119.2, 99.8, 282.5]
          colors: ["#2E75B6", "#2E75B6", "#2E75B6", "#ED7D31"]
        annotation: "FY2025 surge reflects re-acceleration after FY2024 pause"
      note: "FY2025 acquisition spend of EUR 282.5M = 70% of FCF — healthy reinvestment rate"

  # ── 8. OPERATING MODEL ────────────────────────────────────────────────────
  - id: operating_model
    type: full_table
    section: "03 — Business Model"
    title: "Operating Model — Actuals & Projections (EUR M)"
    table:
      columns: ["", "FY2022A", "FY2023A", "FY2024A", "FY2025A", "FY2026E", "FY2027E", "FY2028E"]
      rows:
        - ["Revenue", "916.7", "1,120", "1,290", "1,552", "1,800", "2,088", "2,422"]
        - ["YoY Growth", "—", "+22.2%", "+15.2%", "+20.3%", "+16.0%", "+16.0%", "+16.0%"]
        - ["Gross Profit", "325.6", "399.6", "471.4", "559.9", "657.1", "762.3", "884.2"]
        - ["Gross Margin", "35.5%", "35.7%", "36.5%", "36.1%", "36.5%", "36.5%", "36.5%"]
        - ["EBIT", "133.9", "180.6", "219.7", "256.0", "315.1", "365.5", "423.9"]
        - ["EBIT Margin", "14.6%", "16.1%", "17.0%", "16.5%", "17.5%", "17.5%", "17.5%"]
        - ["D&A", "134.9", "151.7", "169.6", "204.3", "243.0", "281.9", "327.0"]
        - ["FCF", "195.7", "238.8", "339.3", "402.0", "468.1", "543.0", "629.9"]
        - ["FCF Margin", "21.3%", "21.3%", "26.3%", "25.9%", "26.0%", "26.0%", "26.0%"]
        - ["Acquisitions", "(129.1)", "(119.2)", "(99.8)", "(282.5)", "(270.0)", "(313.3)", "(363.4)"]
      highlight_rows: [0, 3, 5, 7]
      column_notes:
        - "A = Actual; E = Estimated"
        - "FCF = OCF – CapEx (Moomoo definition, inclusive of leases)"

  # ── 9. VERTICAL MARKET STRATEGY ───────────────────────────────────────────
  - id: vms_strategy
    type: two_column
    section: "03 — Business Model"
    title: "Why Vertical Market Software Is a Moat Factory"
    left_column:
      heading: "Sources of Competitive Advantage"
      bullets:
        - "Switching Costs: Proprietary data, regulatory certifications, staff workflows — migration cost often exceeds software cost"
        - "Network Effects (limited): Some platforms benefit from inter-customer data sharing within a vertical"
        - "Niche Dominance: Top 1–3 vendor in micro-verticals; no large competitor wants to enter"
        - "Mission-Critical: Downtime = legal/operational liability for customers"
      subheading: "Moat Score Trend (Morningstar)"
      chart:
        type: line
        title: "Quantitative Moat Score (2021–2026)"
        data:
          labels: ["2021", "2022", "2023", "2024", "2025", "Jul-26"]
          values: [0.72, 0.82, 0.99, 0.99, 0.98, 0.97]
          color: "#2E75B6"
        note: "Score consistently above 0.95 since 2023 → narrow moat well-established"
    right_column:
      heading: "Key End Markets"
      table:
        columns: ["Vertical", "Examples", "Stickiness"]
        rows:
          - ["Healthcare IT", "Patient scheduling, clinical records", "★★★★★"]
          - ["Public Sector", "Permits, land registry, courts", "★★★★★"]
          - ["Education", "School admin, student info systems", "★★★★☆"]
          - ["Financial Services", "Credit union software, insurance workflows", "★★★★☆"]
          - ["Legal/Compliance", "Case management, document systems", "★★★★★"]

  # ── 10. REVENUE & MARGIN HISTORY ──────────────────────────────────────────
  - id: revenue_margin_history
    type: combo_chart
    section: "04 — Financial Performance"
    title: "Revenue Growth with Expanding Margins (FY2019–FY2025)"
    chart:
      type: bar_line_combo
      title: "Revenue (EUR M) and Margins (%)"
      bar_series:
        label: "Revenue (EUR M)"
        data:
          labels: ["FY2019", "FY2020", "FY2021", "FY2022", "FY2023", "FY2024", "FY2025"]
          values: [417.4, 494.0, 742.5, 916.7, 1120.0, 1290.0, 1552.3]
        color: "#2E75B6"
        axis: left
      line_series:
        - label: "Gross Margin %"
          data: [null, null, null, 35.5, 35.7, 36.5, 36.1]
          color: "#ED7D31"
          axis: right
        - label: "EBIT Margin %"
          data: [16.9, 19.4, 16.3, 14.6, 16.1, 17.0, 16.5]
          color: "#375623"
          axis: right
        - label: "FCF Margin %"
          data: [null, null, null, 21.3, 21.3, 26.3, 25.9]
          color: "#7030A0"
          axis: right
      axes:
        left: { label: "EUR M", min: 0, max: 1800 }
        right: { label: "%", min: 0, max: 45 }
    callouts:
      - text: "Revenue CAGR: +24.5% (FY2019–FY2025)"
        style: positive
      - text: "FCF margin step-up in FY2024 reflects operating leverage kicking in"
        style: neutral

  # ── 11. QUARTERLY PERFORMANCE ─────────────────────────────────────────────
  - id: quarterly_performance
    type: two_column
    section: "04 — Financial Performance"
    title: "Quarterly Trends — Q3 2024 Through Q1 2026"
    left_column:
      heading: "EPS and FCF per Quarter (EUR)"
      chart:
        type: bar_grouped
        title: "Quarterly EPS (EUR) and FCF (EUR M)"
        data:
          labels: ["Q3'24", "Q4'24", "Q1'25", "Q2'25", "Q3'25", "Q4'25", "Q1'26"]
          series:
            - label: "EPS (EUR)"
              values: [0.28, 0.40, 0.54, 0.31, -0.94, 0.59, 0.41]
              color: "#2E75B6"
              axis: left
            - label: "FCF (EUR M)"
              values: [29.77, 77.67, 268.55, -18.71, 46.79, 105.39, 277.25]
              color: "#ED7D31"
              axis: right
    right_column:
      heading: "Q3 2025 Anomaly — Explained"
      subheading: "EPS of –€0.94 was non-cash, one-time"
      bullets:
        - "Q3 2025 EPS: –€0.94 (vs. +€0.54 in Q1 2025)"
        - "Cause: €160.7M non-cash loss on sale of long-term equity investments (reclassification, not business deterioration)"
        - "Operating profit Q3 2025: +€64.7M — entirely normal"
        - "FCF Q3 2025: +€46.8M — positive, consistent with prior years"
        - "Q4 2025 snapback: EPS +€0.59, FCF +€105M — confirms underlying health"
      callout:
        style: positive
        text: "Strip out one-time items: underlying EPS for FY2025 ≈ €1.76 (vs. reported €0.50)"

  # ── 12. BALANCE SHEET SNAPSHOT ────────────────────────────────────────────
  - id: balance_sheet
    type: two_column
    section: "04 — Financial Performance"
    title: "Balance Sheet — Capital Discipline & Leverage"
    left_column:
      heading: "Key Balance Sheet Items (EUR M)"
      table:
        columns: ["Metric", "Q1 2026", "FY 2025", "FY 2024", "FY 2023"]
        rows:
          - ["Cash", "331.4", "326.7", "206.2", "179.1"]
          - ["Goodwill + Intangibles", "1,190", "1,200", "950.7", "903.7"]
          - ["LT Equity Investments", "527.4", "515.4", "2.5", "2.4"]
          - ["Total Assets", "2,590", "2,510", "1,540", "1,430"]
          - ["Deferred Revenue (Current)", "453.8", "207.1", "166.6", "138.8"]
          - ["Current Debt", "128.2", "376.2", "249.3", "181.7"]
          - ["LT Debt", "418.0", "414.6", "102.5", "106.1"]
          - ["Total Equity", "837.2", "781.8", "531.4", "592.5"]
          - ["Shareholders' Equity", "510.6", "473.8", "311.3", "339.2"]
        highlight_rows: [3, 7]
    right_column:
      heading: "Balance Sheet Observations"
      bullets:
        - "Deferred revenue of EUR 453.8M (Q1 2026) = forward visibility of recurring earnings"
        - "LT equity investments surged to EUR 527.4M in Q1 2026 (from near-zero in FY2024) — likely strategic minority stake or partnership"
        - "Debt (total ~EUR 546M) manageable: Net Debt / EBITDA ~1.2x"
        - "Goodwill/intangibles growth reflects M&A activity — expected and value-accretive"
        - "Low current ratio (0.62–0.87) is structural: VMS businesses collect cash upfront via subscriptions"
      subheading: "Net Debt / EBITDA"
      chart:
        type: gauge
        value: 1.2
        range: [0, 3]
        zones:
          - [0, 1.5, "#375623"]
          - [1.5, 2.5, "#ED7D31"]
          - [2.5, 3, "#C00000"]
        label: "Net Debt / EBITDA: 1.2x (Healthy)"

  # ── 13. FCF ANALYSIS ──────────────────────────────────────────────────────
  - id: fcf_analysis
    type: combo_chart
    section: "05 — Free Cash Flow Analysis"
    title: "Free Cash Flow: The Lifeblood of the Compounding Model"
    chart:
      type: bar_line_combo
      title: "FCF Generation & Yield (FY2019–FY2025)"
      bar_series:
        label: "FCF — Moomoo Def. (EUR M)"
        data:
          labels: ["FY2019", "FY2020", "FY2021", "FY2022", "FY2023", "FY2024", "FY2025"]
          values: [118.8, 149.5, 171.0, 195.7, 238.8, 339.3, 402.0]
        color: "#2E75B6"
        axis: left
      line_series:
        - label: "FCF Margin %"
          data: [null, null, null, 21.3, 21.3, 26.3, 25.9]
          color: "#ED7D31"
          axis: right
      axes:
        left: { label: "EUR M", min: 0, max: 500 }
        right: { label: "%", min: 0, max: 35 }
    callouts:
      - text: "FCF CAGR FY2022–FY2025: ~27%"
        style: positive
      - text: "FCF / Market Cap (current): ~8.8% unlevered yield at C$92"
        style: highlight

  # ── 14. FCF RECONCILIATION ────────────────────────────────────────────────
  - id: fcf_reconciliation
    type: two_column
    section: "05 — Free Cash Flow Analysis"
    title: "FCF Definition Reconciliation — Morningstar vs. Moomoo"
    left_column:
      heading: "Why Two FCF Numbers Exist"
      table:
        columns: ["Year", "OCF", "CapEx", "Lease Pmts", "Morningstar FCF", "Moomoo FCF"]
        rows:
          - ["FY2022", "203.0", "(7.3)", "(13.5)", "182.2", "195.7"]
          - ["FY2023", "246.6", "(7.8)", "n/a", "241.6", "238.8"]
          - ["FY2024", "347.6", "(8.3)", "(50.3)", "289.1", "339.3"]
          - ["FY2025", "412.7", "(10.7)", "(56.3)", "345.7", "402.0"]
        highlight_rows: [3]
      note: "All values EUR M"
    right_column:
      heading: "Our Definition & Rationale"
      bullets:
        - "We use the Moomoo (OCF – CapEx) definition throughout this deck — excludes lease payments"
        - "Lease payments at TOI are largely real estate and equipment for acquired businesses — should be treated as operating costs but vary significantly quarter-to-quarter"
        - "Morningstar's deduction of ~EUR 56M in FY2025 lease payments is conservative; FY2025 FCF on this basis is EUR 345.7M (still very strong)"
        - "For conservative valuation sensitivity, we present both in the DCF"
      subheading: "FCF Projection (EUR M)"
      chart:
        type: bar
        title: "FCF Trajectory FY2022–FY2030E"
        data:
          labels: ["FY22A", "FY23A", "FY24A", "FY25A", "FY26E", "FY27E", "FY28E", "FY29E", "FY30E"]
          values: [195.7, 238.8, 339.3, 402.0, 468.1, 543.0, 629.9, 730.6, 847.5]
          colors: ["#2E75B6", "#2E75B6", "#2E75B6", "#2E75B6", "#375623", "#375623", "#375623", "#375623", "#375623"]
        color_split: 4

  # ── 15. WACC BUILD ────────────────────────────────────────────────────────
  - id: wacc_build
    type: two_column
    section: "06 — Valuation"
    title: "WACC Build — 10.5% Used in Base Case"
    left_column:
      heading: "WACC Components"
      table:
        columns: ["Component", "Value", "Notes"]
        rows:
          - ["Risk-Free Rate (10yr GoC)", "3.50%", "Govt of Canada 10-yr bond"]
          - ["Equity Risk Premium", "5.50%", "Historical ERP for Canadian equities"]
          - ["Beta (estimated)", "1.1x", "Based on CSU levered beta"]
          - ["Size Premium (TSXV)", "1.00%", "Small-cap illiquidity"]
          - ["Cost of Equity (Ke)", "10.55%", "Rf + β×ERP + size premium"]
          - ["Pre-tax Cost of Debt", "5.50%", "FY2025 debt issuance terms"]
          - ["Tax Rate", "25.0%", "Canadian statutory rate"]
          - ["After-tax Cost of Debt", "4.13%", "Kd × (1 – tax)"]
          - ["Equity Weight", "80%", "Q1 2026: E$837M / Total$1,383M"]
          - ["Debt Weight", "20%", "Q1 2026: D$546M / Total$1,383M"]
          - ["WACC (blended)", "9.27%", "Use 10.0–10.5% conservatively"]
        highlight_rows: [10]
    right_column:
      heading: "WACC Sensitivity on Base Case Target (C$)"
      chart:
        type: heatmap
        title: "Base DCF Target Price by WACC (rows) × Exit FCF Multiple (cols)"
        row_labels: ["9.0%", "10.0%", "10.5%", "11.0%", "12.0%"]
        col_labels: ["13x", "15x", "16x", "18x", "20x", "22x"]
        data:
          - [177, 199, 210, 231, 253, 274]
          - [170, 190, 201, 221, 242, 262]
          - [166, 186, 196, 216, 237, 257]
          - [162, 182, 192, 212, 231, 251]
          - [156, 174, 184, 203, 222, 240]
        highlight_cell: [2, 2]   # 10.5% WACC, 16x exit = $196 base
        color_scale: ["#C00000", "#ED7D31", "#375623"]
        note: "Base: 10.5% WACC, 16x exit → C$196. All cells above current price C$92 imply positive return."

  # ── 16. DCF MODEL ─────────────────────────────────────────────────────────
  - id: dcf_model
    type: two_column
    section: "06 — Valuation"
    title: "Discounted Cash Flow — Base Case: C$196 Target"
    left_column:
      heading: "DCF Assumptions & Output"
      table:
        columns: ["Scenario", "FCF Growth", "Exit Multiple", "WACC", "Target (C$)", "Upside"]
        rows:
          - ["Bear", "12%", "15x", "11.5%", "139", "+50%"]
          - ["Base", "18%", "16x", "10.5%", "196", "+112%"]
          - ["Bull", "23%", "22x", "9.5%", "328", "+256%"]
        highlight_rows: [1]
      subheading: "Projected FCF (EUR M)"
      table2:
        columns: ["Year", "FCF (EUR M)", "PV @ 10.5%"]
        rows:
          - ["FY2026E", "468.1", "423.7"]
          - ["FY2027E", "543.0", "444.4"]
          - ["FY2028E", "629.9", "465.4"]
          - ["FY2029E", "730.6", "488.1"]
          - ["FY2030E", "847.5", "511.5"]
          - ["Terminal Value", "~13,900 (16x)", "8,398"]
